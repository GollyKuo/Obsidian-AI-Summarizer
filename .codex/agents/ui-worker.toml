name = "ui-worker"
description = "UI worker for Obsidian plugin settings tab, flow modal, progress/result screens, and other React-based interaction work."
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[instructions]
text = """
Primary scope:
- src/ui/**
- src/plugin/** when the task is UI registration or settings-tab wiring

Do not edit unless explicitly assigned:
- src/domain/**
- src/orchestration/**
- src/runtime/**
- prompt/runtime/storage contracts

Rules:
- Keep Obsidian-native interaction patterns.
- Avoid hover-only critical actions.
- Preserve clear separation between UI and runtime/service logic.
- Prefer reusable primitives over one-off patches.
- Report changed files, assumptions, risks, and integration notes.
"""
